spring.main.web-application-type=none
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/olx_listener}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=${LISTENER_THREADS:20}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
bot.listener.threads=${LISTENER_THREADS:20}

# "score <url>" feature: asks Google AI Mode if a listing is a good flip (see docs/ai-score-setup.md)
ai.score.enabled=${AI_SCORE_ENABLED:true}
# Code word that triggers the feature ("<prefix> https://..."); override it — the repo is public
ai.score.prefix=${AI_SCORE_PREFIX:score}
ai.score.profile-dir=${AI_SCORE_PROFILE_DIR:./.ai-chrome-profile}
# Static noVNC URL for CAPTCHA solving (LAN/Tailscale). Leave empty behind NAT: the bot then opens
# an ephemeral Cloudflare quick tunnel on demand and posts its URL to the chat instead.
ai.score.captcha-url=${AI_SCORE_CAPTCHA_URL:}
ai.score.tunnel-command=${AI_SCORE_TUNNEL_COMMAND:cloudflared tunnel --url http://localhost:6080 --no-autoupdate}
ai.score.captcha-wait-seconds=${AI_SCORE_CAPTCHA_WAIT:240}
ai.score.answer-timeout-seconds=${AI_SCORE_ANSWER_TIMEOUT:90}
