spring.main.web-application-type=none
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/olx_listener}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=${LISTENER_THREADS:20}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
bot.listener.threads=${LISTENER_THREADS:20}

# Channel publishing: feeds are linked to Telegram channels with hidden /link commands,
# available only to this Telegram user id (0 = commands disabled)
channel.admin-user-id=${CHANNEL_ADMIN_USER_ID:0}
# New listings are posted this long after their real publish time (OLX card time), so ~publish + 1h
channel.post-delay-minutes=${CHANNEL_POST_DELAY_MINUTES:60}
# Feeds are scraped on a randomized interval in this range, to avoid a fixed-cadence request pattern
channel.poll-min-seconds=${CHANNEL_POLL_MIN_SECONDS:300}
channel.poll-max-seconds=${CHANNEL_POLL_MAX_SECONDS:420}
channel.publish-interval-ms=${CHANNEL_PUBLISH_INTERVAL_MS:300000}
# A channel gets at most one burst of posts within this many minutes
channel.min-post-interval-minutes=${CHANNEL_MIN_POST_INTERVAL_MINUTES:60}
channel.max-listing-age-hours=${CHANNEL_MAX_LISTING_AGE_HOURS:48}

# Used-IKEA deal channel (isolated furniture pipeline; feeds linked with /ikea-link commands,
# same admin user id as the rental channel above). A deal is a whole-unit listing at least
# furniture.min-discount-pct below its IKEA-model median.
furniture.min-discount-pct=${FURNITURE_MIN_DISCOUNT_PCT:25}
furniture.post-delay-minutes=${FURNITURE_POST_DELAY_MINUTES:60}
# All due deals for a channel post together as one hourly burst (one notification)
furniture.min-post-interval-minutes=${FURNITURE_MIN_POST_INTERVAL_MINUTES:60}
furniture.max-listing-age-hours=${FURNITURE_MAX_LISTING_AGE_HOURS:48}
furniture.comparables-window-days=${FURNITURE_COMPARABLES_WINDOW_DAYS:35}
furniture.poll-min-seconds=${FURNITURE_POLL_MIN_SECONDS:300}
furniture.poll-max-seconds=${FURNITURE_POLL_MAX_SECONDS:420}
furniture.publish-interval-ms=${FURNITURE_PUBLISH_INTERVAL_MS:300000}
furniture.detail-fetch-pause-ms=${FURNITURE_DETAIL_FETCH_PAUSE_MS:1500}
furniture.silent-from-hour=${FURNITURE_SILENT_FROM_HOUR:22}
furniture.silent-to-hour=${FURNITURE_SILENT_TO_HOUR:8}

# "score <url>" feature: asks Google AI Mode if a listing is a good flip (see docs/ai-score-setup.md)
ai.score.enabled=${AI_SCORE_ENABLED:false}
# Code word that triggers the feature ("<prefix> https://..."); override it — the repo is public
ai.score.prefix=${AI_SCORE_PREFIX:score}
ai.score.profile-dir=${AI_SCORE_PROFILE_DIR:./.ai-chrome-profile}
# Static noVNC URL for CAPTCHA solving (LAN/Tailscale). Leave empty behind NAT: the bot then opens
# an ephemeral Cloudflare quick tunnel on demand and posts its URL to the chat instead.
ai.score.captcha-url=${AI_SCORE_CAPTCHA_URL:}
ai.score.tunnel-command=${AI_SCORE_TUNNEL_COMMAND:cloudflared tunnel --url http://localhost:6080 --no-autoupdate}
# DNS for fresh trycloudflare subdomains lags; wait until the link actually works before posting it
ai.score.tunnel-ready-wait-seconds=${AI_SCORE_TUNNEL_READY_WAIT:120}
ai.score.captcha-wait-seconds=${AI_SCORE_CAPTCHA_WAIT:240}
ai.score.answer-timeout-seconds=${AI_SCORE_ANSWER_TIMEOUT:90}
# Resale headroom over the asking price needed for a BUY verdict (0.4 = comps at least 40% above the
# ask). The verdict is computed here, not by the model — tune it without touching the prompt.
ai.score.buy-margin=${AI_SCORE_BUY_MARGIN:0.4}
# How long the headed Chromium is kept alive between listings before being relaunched. Reusing it
# avoids a browser start per listing and keeps one stable fingerprint (fewer CAPTCHAs); 0 disables.
ai.score.session-idle-minutes=${AI_SCORE_SESSION_IDLE_MINUTES:20}
